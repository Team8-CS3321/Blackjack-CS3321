name: Test-Build-Deploy Pipeline

on:
  push:
    branches: [ main ]

jobs:

  # ── Job 1: Coverage Report ────────────────────────────────────────────────────
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run coverage
        run: uv run pytest --cov=backend --cov-fail-under=80 # Enforce 80% coverage

  # ── Job 2: Build & Push to Docker Hub ─────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: coverage  # Only runs if test job passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Log in to Docker Hub
        run: |
          DOCKER_USERNAME=$(doppler secrets get DOCKER_USERNAME --plain --token ${{ secrets.DOPPLER_TOKEN }})
          DOCKER_PASSWORD=$(doppler secrets get DOCKER_PASSWORD --plain --token ${{ secrets.DOPPLER_TOKEN }})
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

      - name: Build Docker image
        run: docker build -t lukecart/blackjack-isu-cs3321-s26:latest .

      - name: Push Docker image
        run: docker push lukecart/blackjack-isu-cs3321-s26:latest

  # ── Job 3: Deploy to AWS EC2 ───────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build  # Only runs if build job passes

    steps:
      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Fetch secrets from Doppler
        uses: dopplerhq/secrets-fetch-action@v1.2.0
        id: doppler
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@master
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        with:
          host: ${{ steps.doppler.outputs.EC2_HOST }}
          username: ${{ steps.doppler.outputs.AWS_EC2_USERNAME }}
          key: ${{ steps.doppler.outputs.SSH_AWS_PEM }}
          envs: DOPPLER_TOKEN
          script: |
            docker pull lukecart/blackjack-isu-cs3321-s26:latest
            docker stop blackjack || true
            docker rm blackjack || true
            docker run -d \
              --name blackjack \
              --restart unless-stopped \
              --env DOPPLER_TOKEN=${{ secrets.DOPPLER_TOKEN }} \
              -p 80:3000 \
              lukecart/blackjack-isu-cs3321-s26:latest
