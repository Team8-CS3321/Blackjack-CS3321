name: Test-Build-Deploy Pipeline

on:
  push:
    branches: [ main ]

jobs:

  # ── Job 1: Test ────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest

  # ── Job 2: Build & Push to Docker Hub ─────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test  # Only runs if test job passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Log in to Docker Hub
        run: |
          DOCKER_USERNAME=$(doppler secrets get DOCKER_USERNAME --plain --token ${{ secrets.DOPPLER_TOKEN }})
          DOCKER_PASSWORD=$(doppler secrets get DOCKER_PASSWORD --plain --token ${{ secrets.DOPPLER_TOKEN }})
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

      - name: Build Docker image
        run: docker build -t lukecart/blackjack-isu-cs3321-s26:latest .

      - name: Push Docker image
        run: docker push lukecart/blackjack-isu-cs3321-s26:latest

  # ── Job 3: Deploy to AWS EC2 ───────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build  # Only runs if build job passes

    steps:
      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Fetch secrets from Doppler
        run: |
          echo "EC2_HOST=$(doppler secrets get EC2_HOST --plain --token ${{ secrets.DOPPLER_TOKEN }})" >> $GITHUB_ENV
          echo "AWS_EC2_USERNAME=$(doppler secrets get AWS_EC2_USERNAME --plain --token ${{ secrets.DOPPLER_TOKEN }})" >> $GITHUB_ENV
          doppler secrets get SSH_AWS_PEM --plain --token ${{ secrets.DOPPLER_TOKEN }} > aws-key.pem
          chmod 600 aws-key.pem

      - name: Write PEM key to file
        run: |
          echo "${{ env.SSH_AWS_PEM }}" > aws-key.pem
          chmod 600 aws-key.pem

      - name: Deploy to EC2 via SSH
        run: |
          ssh -o StrictHostKeyChecking=no -i aws-key.pem ${{ env.AWS_EC2_USERNAME }}@${{ env.EC2_HOST }} << 'EOF'
            docker pull lukecart/blackjack-isu-cs3321-s26:latest
            docker stop blackjack || true
            docker rm blackjack || true
            docker run -d \
              --name blackjack \
              --restart unless-stopped \
              --env DOPPLER_TOKEN=${{ secrets.DOPPLER_TOKEN }} \
              -p 80:3000 \
              lukecart/blackjack-isu-cs3321-s26:latest
          EOF

      - name: Clean up PEM file
        if: always()
        run: rm -f aws-key.pem
