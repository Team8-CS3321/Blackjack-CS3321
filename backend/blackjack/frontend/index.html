<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>♠ Blackjack ♠</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green: #33ff33;
      --dim-green: #1a8c1a;
      --red: #ff4444;
      --amber: #ffaa00;
      --bg: #0a0a0a;
      --card-bg: #111;
    }

    body {
      font-family: 'VT323', monospace;
      background: var(--bg);
      color: var(--green);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      text-shadow: 0 0 8px rgba(51, 255, 51, 0.4);
    }

    #app {
      max-width: 1120px;
      width: 100%;
    }

    #lobby {
      max-width: 700px;
      margin: 0 auto;
    }

    #room {
      width: 100%;
    }

    .room-layout {
      display: grid;
      grid-template-columns: minmax(0, 7fr) minmax(260px, 3fr);
      gap: 16px;
      align-items: start;
    }

    .room-main,
    .room-side {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .room-main .panel,
    .room-side .panel {
      margin-bottom: 0;
    }

    .ascii-header {
      margin: 0 auto 24px;
      max-width: 700px;
      text-align: center;
      font-size: 16px;
      line-height: 1.2;
      color: var(--amber);
      text-shadow: 0 0 12px rgba(255, 170, 0, 0.4);
      border: 2px solid var(--amber);
      padding: 10px 18px;
      box-shadow: 0 0 12px rgba(255, 170, 0, 0.35), inset 0 0 12px rgba(255, 170, 0, 0.15);
    }

    .ascii-header .title-line {
      letter-spacing: 0.28em;
      font-size: 26px;
      margin-bottom: 4px;
    }

    .ascii-header .sub-line {
      letter-spacing: 0.08em;
      font-size: 40px;
    }

    .panel {
      border: 2px solid var(--dim-green);
      padding: 20px;
      margin-bottom: 16px;
      background: var(--card-bg);
    }

    .panel-title {
      color: var(--amber);
      font-size: 22px;
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 20px;
      margin-bottom: 4px;
    }

    input[type="text"] {
      font-family: 'VT323', monospace;
      font-size: 22px;
      background: transparent;
      border: 1px solid var(--dim-green);
      color: var(--green);
      padding: 8px 12px;
      width: 100%;
      margin-bottom: 12px;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: var(--green);
      box-shadow: 0 0 8px rgba(51, 255, 51, 0.3);
    }
    input[type="text"]::placeholder { color: var(--dim-green); }

    .btn {
      font-family: 'VT323', monospace;
      font-size: 22px;
      background: transparent;
      color: var(--green);
      border: 2px solid var(--green);
      padding: 8px 24px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover {
      background: var(--green);
      color: var(--bg);
      text-shadow: none;
    }
    .btn-amber {
      color: var(--amber);
      border-color: var(--amber);
    }
    .btn-amber:hover {
      background: var(--amber);
      color: var(--bg);
    }
    .btn-red {
      color: var(--red);
      border-color: var(--red);
    }
    .btn-red:hover {
      background: var(--red);
      color: var(--bg);
    }

    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .room-action-row {
      align-items: center;
      flex-wrap: nowrap;
    }

    .room-code-inline {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      gap: 10px;
      min-width: 280px;
      padding: 8px 14px;
      border: 2px solid var(--amber);
      color: var(--amber);
    }

    .room-code-inline .code-label {
      font-size: 18px;
      color: var(--dim-green);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .room-code-inline .room-code {
      font-size: 26px;
      letter-spacing: 3px;
      color: var(--amber);
      text-shadow: 0 0 12px rgba(255, 170, 0, 0.45);
      white-space: nowrap;
    }

    .room-code-inline #inviteBtn {
      margin: 0;
      padding: 4px 10px;
      font-size: 20px;
      line-height: 1;
      white-space: nowrap;
    }

    .room-code-inline #inviteFlash {
      font-size: 16px;
      color: var(--green);
      white-space: nowrap;
    }

    .error {
      color: var(--red);
      font-size: 20px;
      margin-bottom: 8px;
      text-shadow: 0 0 8px rgba(255, 68, 68, 0.4);
    }

    .player-list {
      list-style: none;
      font-size: 20px;
    }
    .player-list li {
      padding: 4px 0;
    }
    .player-list .host::after {
      content: " [HOST]";
      color: var(--amber);
    }
    .player-list .ready::after {
      content: " ✓ READY";
      color: var(--green);
    }

    .room-code {
      font-size: 36px;
      color: var(--amber);
      letter-spacing: 6px;
      text-shadow: 0 0 16px rgba(255, 170, 0, 0.5);
    }

    #chatBox {
      border: 1px solid var(--dim-green);
      height: 150px;
      overflow-y: auto;
      padding: 8px;
      margin-bottom: 8px;
      font-size: 18px;
      background: rgba(0, 0, 0, 0.5);
    }
    #chatBox .msg-user { color: var(--amber); }
    #chatBox .msg-system { color: var(--dim-green); font-style: italic; }

    .chat-input-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .chat-input-row input { flex: 1; min-width: 0; margin-bottom: 0; }
    .chat-input-row .btn { flex-shrink: 0; }
    .btn-ai {
      color: var(--amber);
      border-color: var(--amber);
      padding: 8px 12px;
      font-size: 18px;
      white-space: nowrap;
    }
    .btn-ai:hover:not(:disabled) {
      background: var(--amber);
      color: var(--bg);
    }

    .hidden { display: none; }

    .blink {
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }

    /* ── Game table ─────────────────────────── */
    #gameTable { padding: 16px; }
    .dealer-area {
      border: 1px dashed var(--amber);
      padding: 10px;
      margin-bottom: 12px;
      text-align: center;
    }
    .dealer-area .label { color: var(--amber); font-size: 18px; }
    .seats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .seat {
      border: 1px solid var(--dim-green);
      padding: 8px;
      font-size: 16px;
      background: rgba(0,0,0,0.4);
    }
    .seat.active {
      border-color: var(--amber);
      box-shadow: 0 0 10px rgba(255,170,0,0.45);
    }
    .seat.me { border-color: var(--green); }
    .seat .seat-name { color: var(--amber); font-size: 18px; }
    .seat .seat-status { color: var(--dim-green); font-style: italic; }
    .seat .seat-status.win { color: var(--green); font-style: normal; }
    .seat .seat-status.lose,
    .seat .seat-status.bust { color: var(--red); font-style: normal; }
    .hand-row {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin: 6px 0;
    }
    .card {
      display: inline-block;
      min-width: 38px;
      padding: 4px 6px;
      background: #f5f5dc;
      color: #111;
      border: 1px solid #000;
      border-radius: 4px;
      font-family: 'VT323', monospace;
      font-size: 20px;
      text-align: center;
      text-shadow: none;
    }
    .card.red { color: #c00; }
    .card.back {
      background: repeating-linear-gradient(45deg, #224, #224 4px, #335 4px, #335 8px);
      color: var(--amber);
      border-color: var(--amber);
    }
    .status-line {
      font-size: 20px;
      color: var(--amber);
      margin-bottom: 10px;
      text-align: center;
    }
    .controls {
      border: 1px solid var(--dim-green);
      padding: 10px;
      margin-bottom: 10px;
    }
    .controls .chip-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .controls .chip {
      font-family: 'VT323', monospace;
      font-size: 18px;
      padding: 4px 10px;
      background: transparent;
      color: var(--amber);
      border: 1px solid var(--amber);
      cursor: pointer;
    }
    .controls .chip:hover:not(:disabled) { background: var(--amber); color: var(--bg); }
    .controls input[type="number"] {
      font-family: 'VT323', monospace;
      font-size: 20px;
      background: transparent;
      border: 1px solid var(--dim-green);
      color: var(--green);
      padding: 4px 8px;
      width: 100px;
    }
    .btn:disabled, .chip:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .btn:disabled:hover { background: transparent; color: inherit; }
    .results-panel {
      border: 1px solid var(--amber);
      padding: 10px;
      margin-bottom: 10px;
      font-size: 18px;
    }
    .results-panel .result-line { padding: 2px 0; }
    .results-panel .win { color: var(--green); }
    .results-panel .lose { color: var(--red); }
    .results-panel .push { color: var(--amber); }

    .scanline {
      pointer-events: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.08) 2px,
        rgba(0, 0, 0, 0.08) 4px
      );
      z-index: 999;
    }

    @media (max-width: 1100px) {
      .room-action-row {
        flex-wrap: wrap;
      }

      .room-code-inline {
        flex-wrap: wrap;
        min-width: 0;
        width: 100%;
      }

      .room-code-inline #inviteFlash {
        width: 100%;
      }
    }

    @media (max-width: 900px) {
      .room-layout {
        grid-template-columns: 1fr;
      }

      .room-side {
        order: 1;
      }

      .room-main {
        order: 2;
      }
    }
  </style>
</head>
<body>
  <div class="scanline"></div>

  <div id="app">
    <div class="ascii-header" id="gameTitleHeader">
      <div class="title-line">♠ ♥ BLACKJACK ♣ ♦</div>
      <div class="sub-line">~ multiplayer ~</div>
    </div>

    <!-- ── LOBBY SCREEN ─────────────────────── -->
    <div id="lobby">
      <div class="panel">
        <div class="panel-title">&gt; ENTER YOUR NAME</div>
        <input type="text" id="usernameInput" placeholder="username" maxlength="16" autofocus />
        <div id="lobbyError" class="error hidden"></div>
        <div class="btn-row">
          <button class="btn" onclick="createRoom()">[ CREATE TABLE ]</button>
          <button class="btn btn-amber" onclick="showJoin()">[ JOIN TABLE ]</button>
          <button class="btn" onclick="startSingleplayer()">[ PLAY SINGLEPLAYER ]</button>
        </div>
      </div>

      <div id="joinPanel" class="panel hidden">
        <div class="panel-title">&gt; ENTER ROOM CODE</div>
        <input type="text" id="codeInput" placeholder="XXXXX" maxlength="5"
               style="text-transform:uppercase; letter-spacing:4px;" />
        <button class="btn btn-amber" onclick="joinRoom()">[ JOIN ]</button>
      </div>
    </div>

    <!-- ── ROOM SCREEN ──────────────────────── -->
    <div id="room" class="hidden">
      <div class="room-layout">
        <div class="room-main">
          <div id="gameTable" class="panel hidden">
            <div class="panel-title">&gt; TABLE</div>
            <div class="status-line" id="statusMsg">Waiting for game to start...</div>

            <div class="dealer-area">
              <div class="label">DEALER <span id="dealerValue"></span></div>
              <div class="hand-row" id="dealerHand"></div>
            </div>

            <div class="seats-grid" id="seatsContainer"></div>

            <div class="results-panel hidden" id="resultsBox"></div>

            <div class="controls" id="controlsPanel">
              <div class="chip-row" id="chipRow">
                <button class="chip" onclick="addChip(10)" data-chip="10">+10</button>
                <button class="chip" onclick="addChip(25)" data-chip="25">+25</button>
                <button class="chip" onclick="addChip(50)" data-chip="50">+50</button>
                <button class="chip" onclick="addChip(100)" data-chip="100">+100</button>
                <button class="chip" onclick="clearBet()">CLEAR</button>
                <input type="number" id="betInput" min="1" value="0" />
              </div>
              <div class="btn-row">
                <button class="btn" id="betBtn" onclick="placeBet()" disabled>[ PLACE BET ]</button>
                <button class="btn" id="hitBtn" onclick="hit()" disabled>[ HIT ]</button>
                <button class="btn btn-amber" id="standBtn" onclick="stand()" disabled>[ STAND ]</button>
              </div>
            </div>
          </div>

          <div class="btn-row room-action-row" style="margin-top:8px;">
            <button class="btn btn-amber hidden" id="startGameBtn" onclick="startGame()">[ START GAME ]</button>
            <button class="btn btn-amber hidden" id="nextRoundBtn" onclick="nextRound()">[ NEXT ROUND ]</button>
            <button class="btn" onclick="toggleReady()">[ READY ]</button>
            <button class="btn btn-red" onclick="leaveRoom()">[ LEAVE ]</button>

            <div class="room-code-inline">
              <span class="code-label">TABLE</span>
              <div class="room-code" id="roomCodeDisplay"></div>
              <button class="btn btn-amber hidden" id="inviteBtn" onclick="revealInvite()">[ INVITE ]</button>
              <span id="inviteFlash" class="hidden"></span>
            </div>
          </div>

          <p id="waitingMsg" style="margin-top:8px; font-size:20px;">
            <span class="blink">▌</span> Waiting for players...
          </p>
        </div>

        <div class="room-side">
          <div class="panel">
            <div class="panel-title">&gt; CHAT</div>
            <div id="chatBox"></div>
            <div class="chat-input-row">
              <input type="text" id="chatInput" placeholder="type a message..."
                     onkeydown="if(event.key==='Enter')sendChat()" />
              <button class="btn btn-ai" id="aiHelpBtn" onclick="askAIHelp()">AI HELP</button>
              <button class="btn" onclick="sendChat()">SEND</button>
            </div>
          </div>

          <div class="panel">
            <div class="panel-title">&gt; PLAYERS</div>
            <ul class="player-list" id="playerList"></ul>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Socket.io client -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
  <script>
    if (typeof io === "undefined") {
      document.getElementById("lobbyError").textContent = "> Failed to load Socket.IO. Check your internet connection.";
      document.getElementById("lobbyError").classList.remove("hidden");
      throw new Error("Socket.IO failed to load");
    }
    const socket = io();

    // ── DOM refs ──────────────────────────────
    const $lobby     = document.getElementById("lobby");
    const $room      = document.getElementById("room");
    const $gameTitleHeader = document.getElementById("gameTitleHeader");
    const $joinPanel = document.getElementById("joinPanel");
    const $lobbyErr  = document.getElementById("lobbyError");
    const $username  = document.getElementById("usernameInput");
    const $codeInput = document.getElementById("codeInput");
    const $roomCode  = document.getElementById("roomCodeDisplay");
    const $players   = document.getElementById("playerList");
    const $chatBox   = document.getElementById("chatBox");
    const $chatInput = document.getElementById("chatInput");
    const $aiHelpBtn = document.getElementById("aiHelpBtn");
    const $waitingMsg = document.getElementById("waitingMsg");

    const MAX_USERNAME_LENGTH = 16;
    const MAX_CHAT_LENGTH = 200;
    let currentRoomState = null;
    let wasDisconnected = false;
    let myUsername = null;
    let myPlayerId = null;
    let isSinglePlayer = false;
    let currentGameState = null;
    let lastResults = null;
    let lastDealerFull = null;
    let lastDealerValue = null;
    let aiHelpTimeoutId = null;
    let aiHelpRequestToken = 0;
    let inviteCodePinnedVisible = false;

    const $gameTable   = document.getElementById("gameTable");
    const $statusMsg   = document.getElementById("statusMsg");
    const $dealerHand  = document.getElementById("dealerHand");
    const $dealerValue = document.getElementById("dealerValue");
    const $seats       = document.getElementById("seatsContainer");
    const $results     = document.getElementById("resultsBox");
    const $betInput    = document.getElementById("betInput");
    const $betBtn      = document.getElementById("betBtn");
    const $hitBtn      = document.getElementById("hitBtn");
    const $standBtn    = document.getElementById("standBtn");
    const $startGameBtn = document.getElementById("startGameBtn");
    const $nextRoundBtn = document.getElementById("nextRoundBtn");
    const $chipRow     = document.getElementById("chipRow");
    const $inviteBtn   = document.getElementById("inviteBtn");
    const $inviteFlash = document.getElementById("inviteFlash");

    // ── Connection lifecycle ──────────────────
    socket.on("disconnect", () => {
      wasDisconnected = true;
      if (aiHelpTimeoutId !== null) {
        clearTimeout(aiHelpTimeoutId);
        aiHelpTimeoutId = null;
      }
      $aiHelpBtn.disabled = false;
      $aiHelpBtn.textContent = "AI HELP";
      if (!$room.classList.contains("hidden")) {
        $room.classList.add("hidden");
        $lobby.classList.remove("hidden");
        $gameTitleHeader.classList.remove("hidden");
        $chatBox.innerHTML = "";
        $players.innerHTML = "";
        currentRoomState = null;
      }
      showError("Lost connection to server. Returned to lobby.");
    });

    socket.on("connect", () => {
      if (wasDisconnected) {
        wasDisconnected = false;
        showError("Reconnected. Please rejoin or create a table.");
      }
    });

    // ── Lobby actions ────────────────────────
    function showError(msg) {
      $lobbyErr.textContent = "> " + msg;
      $lobbyErr.classList.remove("hidden");
    }
    function clearError() {
      $lobbyErr.classList.add("hidden");
    }

    function getUsername() {
      const name = $username.value.trim().slice(0, MAX_USERNAME_LENGTH);
      if (!name) {
        showError("Enter a username first.");
        return null;
      }
      clearError();
      return name;
    }

    function showJoin() {
      $joinPanel.classList.toggle("hidden");
      if (!$joinPanel.classList.contains("hidden")) {
        $codeInput.focus();
      }
    }

    function createRoom() {
      const username = getUsername();
      if (!username) return;

      socket.emit("room:create", { username }, (res) => {
        if (res.error) return showError(res.error);
        myUsername = username;
        myPlayerId = res.player_id || null;
        enterRoom(res.code);
      });
    }

    function startSingleplayer() {
      const username = getUsername();
      if (!username) return;
      socket.emit("singleplayer:start", { username }, (res) => {
        if (res.error) return showError(res.error);
        myUsername = username;
        myPlayerId = res.player_id || null;
        isSinglePlayer = true;
        enterRoom(res.code);
      });
    }

    function joinRoom() {
      const username = getUsername();
      if (!username) return;
      const code = $codeInput.value.trim().toUpperCase();
      if (!code) {
        showError("Enter a room code.");
        return;
      }

      socket.emit("room:join", { username, code }, (res) => {
        if (res.error) return showError(res.error);
        myUsername = username;
        myPlayerId = res.player_id || null;
        enterRoom(res.code);
      });
    }

    function enterRoom(code) {
      $lobby.classList.add("hidden");
      $room.classList.remove("hidden");
      $gameTitleHeader.classList.add("hidden");
      $roomCode.textContent = code;
      inviteCodePinnedVisible = false;
      $chatInput.value = "";
      applyRoomCodeVisibility();
    }

    function applyRoomCodeVisibility() {
      // In singleplayer-originated rooms, hide the code until host clicks INVITE.
      // In normal multiplayer rooms, keep the code visible as before.
      const isSolo = isSinglePlayer;
      const alone = !currentRoomState || currentRoomState.players.length <= 1;
      const iAmHost = currentRoomState
        && myPlayerId
        && currentRoomState.players.some(
             (p) => p.id === currentRoomState.hostId && p.player_id === myPlayerId
           );
      if (isSolo && alone && !inviteCodePinnedVisible) {
        $roomCode.classList.add("hidden");
        $inviteBtn.classList.toggle("hidden", !iAmHost);
      } else {
        $roomCode.classList.remove("hidden");
        // Once a second player has joined, the invite button is no longer meaningful.
        $inviteBtn.classList.add("hidden");
      }
    }

    function revealInvite() {
      const code = $roomCode.textContent;
      inviteCodePinnedVisible = true;
      $roomCode.classList.remove("hidden");
      $inviteBtn.classList.add("hidden");
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(code).catch(() => {});
      }
      $inviteFlash.textContent = "COPIED";
      $inviteFlash.classList.remove("hidden");
      setTimeout(() => $inviteFlash.classList.add("hidden"), 2500);
    }

    // ── Room actions ─────────────────────────
    function toggleReady() {
      socket.emit("player:ready");
    }

    function leaveRoom() {
      aiHelpRequestToken += 1;
      if (aiHelpTimeoutId !== null) {
        clearTimeout(aiHelpTimeoutId);
        aiHelpTimeoutId = null;
      }
      $aiHelpBtn.disabled = false;
      $aiHelpBtn.textContent = "AI HELP";
      socket.emit("room:leave");
      $room.classList.add("hidden");
      $lobby.classList.remove("hidden");
      $gameTitleHeader.classList.remove("hidden");
      $chatBox.innerHTML = "";
      $players.innerHTML = "";
      currentRoomState = null;
      currentGameState = null;
      lastResults = null;
      lastDealerFull = null;
      lastDealerValue = null;
      myUsername = null;
      myPlayerId = null;
      isSinglePlayer = false;
        inviteCodePinnedVisible = false;
      $gameTable.classList.add("hidden");
      $startGameBtn.classList.add("hidden");
      $nextRoundBtn.classList.add("hidden");
      $results.classList.add("hidden");
      $inviteBtn.classList.add("hidden");
      $inviteFlash.classList.add("hidden");
      $roomCode.classList.remove("hidden");
      $waitingMsg.classList.remove("hidden");
      renderReadyState();
      renderWaitingText();
    }

    function sendChat() {
      const msg = $chatInput.value.trim().slice(0, MAX_CHAT_LENGTH);
      if (!msg) return;
      socket.emit("chat:message", { message: msg });
      $chatInput.value = "";
    }

    function askAIHelp() {
      if ($aiHelpBtn.disabled) return;

      const query = $chatInput.value.trim().slice(0, 300);
      const requestToken = ++aiHelpRequestToken;
      $aiHelpBtn.disabled = true;
      $aiHelpBtn.textContent = "AI...";

      aiHelpTimeoutId = setTimeout(() => {
        if (requestToken !== aiHelpRequestToken) return;
        aiHelpTimeoutId = null;
        $aiHelpBtn.disabled = false;
        $aiHelpBtn.textContent = "AI HELP";
        appendChat(null, "AI help: Request timed out. Please try again.");
      }, 16000);

      socket.emit("ai:help", { query }, (res) => {
        if (requestToken !== aiHelpRequestToken) return;
        if (aiHelpTimeoutId !== null) {
          clearTimeout(aiHelpTimeoutId);
          aiHelpTimeoutId = null;
        }
        $aiHelpBtn.disabled = false;
        $aiHelpBtn.textContent = "AI HELP";

        if (!res || res.error) {
          appendChat(null, "AI help: " + ((res && res.error) || "No response from server."));
          return;
        }

        if (query) {
          appendChat(myUsername || "You", "[AI] " + query);
          $chatInput.value = "";
        }
        appendChat("AI Helper", res.message);
      });
    }

    // ── Socket events ────────────────────────
    socket.on("room:update", (state) => {
      currentRoomState = state;
      $players.innerHTML = state.players
        .map((p) => {
          let classes = [];
          if (p.id === state.hostId) classes.push("host");
          if (p.ready) classes.push("ready");
          const isMe = p.username === myUsername;
          const youTag = isMe ? ' <span style="color:var(--green);">(YOU)</span>' : "";
          return `<li class="${classes.join(" ")}">♠ ${escapeHtml(p.username)}${youTag}</li>`;
        })
        .join("");

      // If the server says this was born as singleplayer, remember that
      // client-side so invite-code visibility stays consistent on refresh.
      if (state.singleplayerOrigin) isSinglePlayer = true;

      renderReadyState();
      renderWaitingText();
      renderStartGameBtn();
      applyRoomCodeVisibility();
      // Re-render the table so spectators appear in seats grid immediately.
      if (currentGameState) renderTable();
    });

    socket.on("room:player-joined", ({ username }) => {
      appendChat(null, `${username} joined the table.`);
    });

    socket.on("room:new-host", ({ username }) => {
      appendChat(null, `${username} is now the host.`);
    });

    socket.on("room:player-left", ({ username }) => {
      appendChat(null, `${username} left the table.`);
    });

    socket.on("chat:message", ({ username, message }) => {
      appendChat(username, message);
    });

    function appendChat(user, text) {
      const div = document.createElement("div");
      if (user) {
        div.innerHTML = `<span class="msg-user">${escapeHtml(user)}:</span> ${escapeHtml(text)}`;
      } else {
        div.innerHTML = `<span class="msg-system">* ${escapeHtml(text)}</span>`;
      }
      $chatBox.appendChild(div);
      $chatBox.scrollTop = $chatBox.scrollHeight;
    }

    function renderReadyState() {
      const readyButton = document.querySelector('button[onclick="toggleReady()"]');
      if (!readyButton || !currentRoomState) return;

      const me = currentRoomState.players.find((p) => p.username === myUsername);
      readyButton.textContent = me?.ready ? "[ UNREADY ]" : "[ READY ]";
    }

    function renderWaitingText() {
      // Hide the waiting message once the game has started — the table UI
      // carries its own status line from that point on.
      const gameRunning =
        (currentRoomState && currentRoomState.gameStarted) || currentGameState;
      if (gameRunning) {
        $waitingMsg.classList.add("hidden");
        return;
      }
      $waitingMsg.classList.remove("hidden");

      if (!currentRoomState) {
        $waitingMsg.innerHTML = '<span class="blink">▌</span> Waiting for players...';
        return;
      }

      const total = currentRoomState.players.length;
      const readyCount = currentRoomState.players.filter((p) => p.ready).length;
      if (readyCount < total) {
        $waitingMsg.innerHTML = `<span class="blink">▌</span> Waiting for players to ready up... (${readyCount}/${total})`;
        return;
      }
      $waitingMsg.innerHTML = `<span class="blink">▌</span> All ready (${readyCount}/${total}). Host can start.`;
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    // ── Game / table wiring ──────────────────────
    socket.on("singleplayer:ready", ({ code, player_id, state }) => {
      isSinglePlayer = true;
      if (player_id) myPlayerId = player_id;
      if (code) enterRoom(code);
      $gameTable.classList.remove("hidden");
      $waitingMsg.classList.add("hidden");
      if (state) applyGameState(state);
    });

    socket.on("game:started", () => {
      $gameTable.classList.remove("hidden");
      socket.emit("game:get-state", (state) => {
        if (state && !state.error) applyGameState(state);
      });
    });

    socket.on("game:round-started", (state) => {
      if (state) applyGameState(state);
    });

    socket.on("game:state", (payload) => {
      if (!payload) return;
      applyGameState(payload);
    });

    function startGame() {
      socket.emit("game:start", (res) => {
        if (res && res.error) appendChat(null, "Can't start: " + res.error);
      });
    }

    function nextRound() {
      socket.emit("game:next-round", (res) => {
        if (res && res.error) appendChat(null, "Next round: " + res.error);
      });
    }

    function addChip(value) {
      const cur = parseInt($betInput.value, 10) || 0;
      $betInput.value = cur + value;
    }

    function clearBet() {
      $betInput.value = 0;
    }

    function placeBet() {
      const amount = parseInt($betInput.value, 10) || 0;
      if (amount <= 0) {
        appendChat(null, "Enter a bet amount greater than zero.");
        return;
      }
      socket.emit("game:place-bet", { amount }, (res) => {
        if (res && res.error) appendChat(null, "Bet: " + res.error);
      });
    }

    function hit() {
      socket.emit("game:hit", (res) => {
        if (res && res.error) appendChat(null, "Hit: " + res.error);
      });
    }

    function stand() {
      socket.emit("game:stand", (res) => {
        if (res && res.error) appendChat(null, "Stand: " + res.error);
      });
    }

    // Normalize server payloads. Hit/Stand sometimes emit the full state,
    // sometimes emit a round-complete dict with `results` + full dealer hand.
    function applyGameState(payload) {
      const isRoundComplete =
        payload.phase === "round_complete" || payload.results !== undefined;

      if (isRoundComplete) {
        lastResults = payload.results || lastResults;
        if (Array.isArray(payload.dealer_hand)) lastDealerFull = payload.dealer_hand;
        if (payload.dealer_value !== undefined) lastDealerValue = payload.dealer_value;
        // Merge: if payload carries players, use it; else keep previous.
        if (Array.isArray(payload.players)) {
          currentGameState = {
            ...currentGameState,
            phase: "round_complete",
            players: payload.players,
            current_player_index: payload.current_player_index ?? currentGameState?.current_player_index ?? 0,
          };
        } else {
          currentGameState = {
            ...(currentGameState || {}),
            phase: "round_complete",
          };
        }
      } else {
        currentGameState = payload;
        if (payload.phase !== "round_complete") {
          lastResults = null;
        }
      }
      renderTable();
    }

    function renderTable() {
      if (!currentGameState) return;
      $gameTable.classList.remove("hidden");

      const phase = currentGameState.phase;
      const players = currentGameState.players || [];
      const activeIndex = currentGameState.current_player_index ?? 0;

      // Dealer
      let dealerCards;
      if (phase === "round_complete" && lastDealerFull) {
        dealerCards = lastDealerFull.map(renderCard).join("");
        $dealerValue.textContent = lastDealerValue !== null && lastDealerValue !== undefined
          ? "(" + lastDealerValue + ")" : "";
      } else {
        const shown = currentGameState.dealer_hand || [];
        dealerCards = shown.map(renderCard).join("") + renderCardBack();
        $dealerValue.textContent = "";
      }
      $dealerHand.innerHTML = dealerCards;

      // Seats (active players from game state, spectators from room state)
      const seatedIds = new Set(players.map((p) => p.player_id));
      const spectators = (currentRoomState && currentRoomState.players || [])
        .filter((rp) => rp.player_id && !seatedIds.has(rp.player_id));
      const spectatorHTML = spectators.map((sp) => {
        const isMe = sp.player_id === myPlayerId;
        return `
          <div class="seat">
            <div class="seat-name">♠ ${escapeHtml(sp.username)}${isMe ? ' (YOU)' : ''}</div>
            <div class="seat-status">SPECTATING — joins next round</div>
          </div>
        `;
      }).join("");

      $seats.innerHTML = players.map((p, i) => {
        const classes = ["seat"];
        if (i === activeIndex && phase === "playing") classes.push("active");
        if (p.player_id === myPlayerId) classes.push("me");
        const cards = (p.hand || []).map(renderCard).join("") || '<span style="color:var(--dim-green)">—</span>';
        const status = seatStatus(p, i, phase, activeIndex);
        const valueStr = (p.hand_value !== null && p.hand_value !== undefined) ? p.hand_value : (p.is_bust ? "BUST" : "");
        return `
          <div class="${classes.join(' ')}">
            <div class="seat-name">♠ ${escapeHtml(p.username)}${p.player_id === myPlayerId ? ' (YOU)' : ''}</div>
            <div>Chips: ${p.balance} | Bet: ${p.bet}</div>
            <div class="hand-row">${cards}</div>
            <div>Value: ${valueStr}</div>
            <div class="seat-status ${status.cls}">${escapeHtml(status.text)}</div>
          </div>
        `;
      }).join("") + spectatorHTML;

      // Status line
      $statusMsg.textContent = phaseStatusText(phase, players, activeIndex);

      // Results panel
      if (phase === "round_complete" && lastResults) {
        $results.classList.remove("hidden");
        $results.innerHTML = Object.entries(lastResults).map(([name, r]) => {
          const cls = (r.outcome === "win" || r.outcome === "blackjack") ? "win" : r.outcome === "lose" ? "lose" : "push";
          const player = players.find((p) => p.username === name);
          const blackjackNetPayout = r.outcome === "blackjack" &&
            player &&
            typeof player.bet === "number" &&
            typeof r.payout === "number"
            ? r.payout - player.bet
            : null;
          const delta = r.outcome === "blackjack"
            ? (blackjackNetPayout !== null ? ` (+${blackjackNetPayout})` : ` (return ${r.payout})`)
            : r.outcome === "win"
              ? ` (+${r.payout})`
              : r.outcome === "push"
                ? ` (refund ${r.payout})`
                : "";
          const label = r.outcome === "blackjack" ? "BLACKJACK!" : r.outcome.toUpperCase();
          return `<div class="result-line ${cls}">${escapeHtml(name)}: ${label} — ${r.hand_value}${delta}</div>`;
        }).join("");
      } else {
        $results.classList.add("hidden");
      }

      updateControlGating(phase, players, activeIndex);
      renderStartGameBtn();
      renderNextRoundBtn(phase);
    }

    function seatStatus(p, i, phase, activeIndex) {
      if (phase === "round_complete" && lastResults && lastResults[p.username]) {
        const outcome = lastResults[p.username].outcome;
        const text = outcome === "blackjack" ? "BLACKJACK!" : outcome.toUpperCase();
        const cls = outcome === "blackjack" ? "win" : outcome;
        return { text, cls };
      }
      if (p.is_blackjack) return { text: "BLACKJACK!", cls: "win" };
      if (p.is_bust) return { text: "BUST", cls: "bust" };
      if (p.is_stand) return { text: "STAND", cls: "" };
      if (phase === "waiting_for_bets") {
        return { text: p.bet > 0 ? "BET PLACED" : "BETTING", cls: "" };
      }
      if (phase === "playing") {
        return { text: i === activeIndex ? "PLAYING" : "WAITING", cls: "" };
      }
      if (phase === "dealer_turn") return { text: "DEALER PLAYS", cls: "" };
      return { text: phase.toUpperCase(), cls: "" };
    }

    function phaseStatusText(phase, players, activeIndex) {
      if (phase === "waiting_for_bets") return "Place your bets";
      if (phase === "playing") {
        const active = players[activeIndex];
        if (!active) return "Playing...";
        return (active.player_id === myPlayerId ? "Your turn" : active.username + "'s turn");
      }
      if (phase === "dealer_turn") return "Dealer's turn";
      if (phase === "round_complete") return "Round over";
      return "Waiting...";
    }

    function updateControlGating(phase, players, activeIndex) {
      const me = players.find((p) => p.player_id === myPlayerId);
      const canBet = phase === "waiting_for_bets" && me && me.bet === 0;
      const isMyTurn = phase === "playing"
        && players[activeIndex]
        && players[activeIndex].player_id === myPlayerId
        && me
        && !me.is_bust
        && !me.is_stand;

      $betBtn.disabled = !canBet;
      [...$chipRow.querySelectorAll(".chip")].forEach((c) => c.disabled = !canBet);
      $betInput.disabled = !canBet;

      $hitBtn.disabled = !isMyTurn;
      $standBtn.disabled = !isMyTurn;
    }

    function iAmHost() {
      if (!currentRoomState || !myPlayerId) return false;
      return currentRoomState.players.some(
        (p) => p.id === currentRoomState.hostId && p.player_id === myPlayerId
      );
    }

    function renderStartGameBtn() {
      if (!currentRoomState) {
        $startGameBtn.classList.add("hidden");
        return;
      }
      const allReady = currentRoomState.players.length >= 1 && currentRoomState.players.every((p) => p.ready);
      const gameRunning = currentRoomState.gameStarted || (currentGameState && currentGameState.phase);
      const show = iAmHost() && allReady && !gameRunning;
      $startGameBtn.classList.toggle("hidden", !show);
    }

    function renderNextRoundBtn(phase) {
      const isRoundDone = phase === "round_complete";
      const soloCanTrigger =
        currentRoomState && currentRoomState.players.length === 1
        && myPlayerId && currentRoomState.players[0].player_id === myPlayerId;
      const show = isRoundDone && (soloCanTrigger || iAmHost());
      $nextRoundBtn.classList.toggle("hidden", !show);
    }

    function renderCard(cardStr) {
      // cardStr format: "<Rank> of <Suit>" e.g. "Jack of Hearts", "10 of Spades"
      const parts = cardStr.split(" of ");
      const rank = parts[0];
      const suit = parts[1] || "";
      const glyph = { Hearts: "♥", Diamonds: "♦", Clubs: "♣", Spades: "♠" }[suit] || "?";
      const red = suit === "Hearts" || suit === "Diamonds";
      const shortRank = { Jack: "J", Queen: "Q", King: "K", Ace: "A" }[rank] || rank;
      return `<div class="card ${red ? "red" : ""}">${shortRank}${glyph}</div>`;
    }

    function renderCardBack() {
      return `<div class="card back">?</div>`;
    }
  </script>
</body>
</html>
